name: Vérification Qualité Code

on: [push] # Se lance à chaque fois que vous validez un changement

jobs:
  build:
    name: Analyse du Code
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Lancer le Super-Linter
        uses: super-linter/super-linter@v5
        env:
          VALIDATE_ALL_CODEBASE: false # Vérifie seulement les fichiers modifiés
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Utilise le jeton auto de GitHub
